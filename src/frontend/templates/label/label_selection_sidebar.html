<!-- Label selection side-panel (same z-level as ruleset-selection-panel) -->
<div id="label-selection-panel" class="hidden fixed right-0 top-0 h-screen w-1/4 bg-white shadow-md flex flex-col" style="z-index: 9999;" data-device-id="{{ device.id }}">
    <div class="flex justify-between items-center p-4 border-b bg-gray-200">
        <h2 class="text-xl font-bold">Labels</h2>
        <button class="button-label-selection-panel text-gray-600">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
    <!-- Search and create -->
    <div class="p-4 bg-gray-200 flex justify-between">
        <input type="text" id="label-search-input" class="w-4/5 border border-gray-300 p-2 rounded-lg" placeholder="Search labels" oninput="searchLabelByName(this.value)" autocomplete="off" />
        <button type="button" onclick="openLabelEditFromSelection(null)" class="bg-gray-500 text-white px-2 py-2 rounded" aria-label="Create new label">+ Label</button>
    </div>
    <div class="flex-grow overflow-hidden">
        <div id="label-selection-list" class="p-4 space-y-2 overflow-y-auto h-full">
            {% for label in all_labels %}
            <div class="flex items-center group/rule label-item" data-label-name="{{ label.name|lower }}">
                <input type="checkbox" id="label-sel-{{ label.id }}" value="{{ label.id }}"
                       class="hidden peer label-checkbox"
                       {% if label in labels %}checked{% endif %}>
                <label for="label-sel-{{ label.id }}" class="flex-1 flex justify-between items-center py-1 px-4 bg-white rounded cursor-pointer hover:bg-gray-200 peer-checked:bg-amber-100 peer-checked:hover:bg-yellow-600/50 font-light">
                    <span class="flex items-center gap-2">
                        <span class="inline-block w-3 h-3 rounded-full flex-shrink-0" style="background-color: {{ label.color }};"></span>
                        {{ label.name }}
                    </span>
                    <button type="button" onclick="openLabelEditFromSelection({{ label.id }})" class="group relative rounded-full p-1 bg-transparent" title="Edit label">
                        <div class="opacity-0 group-hover:opacity-100 absolute inset-0 bg-black/10 rounded-full"></div>
                        <svg class="size-4 align-middle invisible group-hover/rule:visible relative z-10" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                        </svg>
                    </button>
                </label>
            </div>
            {% empty %}
            <p class="text-gray-500 text-sm px-2">No labels yet. Create one with the button above.</p>
            {% endfor %}
        </div>
    </div>
    <!-- Apply / Cancel -->
    <div class="flex space-x-2 w-full p-4 bg-gray-200">
        <button type="button" onclick="applyLabelSelection()" class="w-1/2 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Apply</button>
        <button type="button" class="button-label-selection-panel w-1/2 bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">Cancel</button>
    </div>
</div>
